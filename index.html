<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunshine Islands Bus App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <h1>Sunshine Islands Bus Planner</h1>

  <!-- Journey Planner -->
  <section>
    <h2>Plan Your Journey</h2>
    <input type="text" id="startStop" placeholder="Start Stop">
    <input type="text" id="endStop" placeholder="Destination Stop">
    <button onclick="planJourney()">Plan Journey</button>
    <div id="results"></div>
  </section>

  <!-- Live Departures -->
  <section>
    <h2>Live Departures</h2>
    <input type="text" id="stopBoard" placeholder="Enter Stop">
    <button onclick="showDepartures()">Show Departures</button>
    <div id="departureBoard"></div>
  </section>

  <!-- Departure time -->
<input type="number" id="departHour" placeholder="Hour (0-23)" min="0" max="23">
<input type="number" id="departMin" placeholder="Minute (0-59)" min="0" max="59">
<button onclick="planJourneyAtTime()">Plan Journey</button>


</div>

<script src="routes.js"></script>
<script src="planner.js"></script>
<script src="app.js"></script>
<script src="autocomplete.js"></script>
</body>
</html>
