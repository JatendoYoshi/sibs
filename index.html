<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sunshine Islands Transit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚌 Sunshine Islands Transit</h1>
<button onclick="toggleTheme()">🌙</button>
</header>

<section class="planner">

<h2>Journey Planner</h2>

<input id="startStop" placeholder="Start stop">
<input id="endStop" placeholder="Destination">

<button onclick="planJourney()">Plan Journey</button>

<div id="results"></div>

</section>

<section class="departures">

<h2>Live Departures</h2>

<input id="stopBoard" placeholder="Enter stop">
<button onclick="showDepartures()">Show</button>

<div id="departureBoard"></div>

</section>

<section class="map">

<h2>Network Map</h2>

<canvas id="mapCanvas"></canvas>

</section>

<script src="routes.js"></script>
<script src="planner.js"></script>
<script src="map.js"></script>
<script src="app.js"></script>

</body>
</html>
